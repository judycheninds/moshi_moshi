name: Build & Sign Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install npm dependencies (Capacitor, etc.)
      - name: Install dependencies
        run: npm install

      # 4. Set up Java (required for Android builds)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 5. Set up Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 6. Sync Capacitor (copies web assets into the Android project)
      - name: Sync Capacitor
        run: npx cap sync android

      # 7. Make gradlew executable
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 8. Build the release AAB (unsigned)
      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease

      # 9. Sign the AAB using your keystore stored in GitHub Secrets
      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      # 10. Upload the signed AAB as a downloadable artifact
      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: moshi-moshi-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7
